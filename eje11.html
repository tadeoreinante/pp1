<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Formulario de registro</h1>
    <form action="" method="get">
        <p>
            <label for="nombre"> Nombre:</label>
            <input type="text" name="nomber" id="nombre" maxlength="50">
        </p>

        <p>
            <label for="apellido"> Apellido:</label>
            <input type="text" name="apellido" id="apellido" maxlength="50">
        </p>

        <p>
            Sexo:
            <input type="radio" name="sexo" id="masculino" value="masculino" />
            <label for="masculino">Masculino</label>
            <input type="radio" name="sexo" id="femenino" value="femenino" />
            <label for="femenino">Femenino</label>
            <input type="radio" name="sexo" id="no-binario" value="no-binario" />
            <label for="no-binario">No binario</label>
        </p>

        <p>
            <label for="estado"> Estado civil:</label>
            <select name="estado" id="estado">
                <option value="soltero">Soltero</option>
                <option value="casado">Casado</option>
                <option value="divorciado">Divorciado</option>
            </select>
        </p>

        <p>
            <input type="checkbox" name="novedades" id="novedades" value="si" checked>
            <label for="novedades">Deseo recibir informacion sobre novedades y ofertas</label>
        </p>

        <p>
            <input type="checkbox" name="condiciones" id="condiciones" value="si">
            <label for="condiciones">Declaro haber leido y aceptar las condiciones generales del programa y la normativa sobre proteccion de datos</label>
        </p>

        <p>
            <input type="submit" name="Enviar" id="">
        </p>

    </form>
</body>
</html>
